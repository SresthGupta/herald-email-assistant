services:
  - type: web
    name: herald-email
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "false"
