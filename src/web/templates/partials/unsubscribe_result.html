{% if result.success %}
<div class="flex items-center gap-2 w-full py-3 px-4 rounded-2xl bg-green-900/20 border border-green-800/30 text-green-300 text-sm">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  {{ result.message or "Unsubscribed!" }}
</div>
{% else %}
<div class="w-full space-y-2">
  <div class="flex items-center gap-2 py-2.5 px-4 rounded-xl bg-red-900/20 border border-red-800/30 text-red-300 text-xs">
    {{ result.error or result.message or "Could not unsubscribe automatically." }}
  </div>
  {% if result.url %}
  <a href="{{ result.url }}" target="_blank" rel="noopener noreferrer"
     class="flex items-center justify-center gap-2 w-full py-3 px-4 rounded-2xl
            bg-slate-800 border border-slate-700 hover:border-slate-600
            text-slate-300 text-sm font-medium transition-colors">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
    </svg>
    Unsubscribe manually
  </a>
  {% endif %}
</div>
{% endif %}
